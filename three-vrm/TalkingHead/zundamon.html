<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>AIアシスタント</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body,
            html {
                width: 100%;
                height: 100%;
                background: #1a1a2e;
                overflow: hidden;
            }
            canvas {
                display: block;
                width: 100%;
                height: 100%;
            }
            #status {
                position: fixed;
                top: 10px;
                left: 10px;
                color: #00ff88;
                font-family: monospace;
                font-size: 13px;
                background: rgba(0, 0, 0, 0.55);
                padding: 5px 10px;
                border-radius: 4px;
                pointer-events: none;
            }
            #subtitle {
                position: fixed;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                color: #fff;
                font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
                font-size: 20px;
                line-height: 1.4;
                background: rgba(0, 0, 0, 0.72);
                padding: 8px 22px;
                border-radius: 8px;
                display: none;
                max-width: 80%;
                text-align: center;
                pointer-events: none;
            }
            #click-prompt {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #fff;
                font-family: monospace;
                font-size: 16px;
                background: rgba(0, 0, 0, 0.7);
                padding: 12px 24px;
                border-radius: 8px;
                cursor: pointer;
            }
            #mic-controls {
                position: fixed;
                bottom: 20px;
                right: 20px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                align-items: flex-end;
                font-family: monospace;
                color: #fff;
                z-index: 10;
            }
            #mic-btn {
                width: 72px;
                height: 72px;
                border-radius: 50%;
                border: 3px solid #00ff88;
                background: rgba(0, 0, 0, 0.65);
                color: #00ff88;
                font-size: 28px;
                cursor: pointer;
                user-select: none;
                transition:
                    transform 0.08s,
                    background 0.12s,
                    border-color 0.12s;
            }
            #mic-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }
            #mic-btn.recording {
                background: rgba(255, 0, 80, 0.75);
                border-color: #ff3060;
                color: #fff;
                transform: scale(1.08);
                animation: pulse 1s ease-in-out infinite;
            }
            #mic-btn.busy {
                background: rgba(80, 80, 255, 0.55);
                border-color: #8080ff;
                color: #fff;
            }
            @keyframes pulse {
                0%,
                100% {
                    box-shadow: 0 0 0 0 rgba(255, 48, 96, 0.6);
                }
                50% {
                    box-shadow: 0 0 0 12px rgba(255, 48, 96, 0);
                }
            }
            #mic-hint {
                font-size: 12px;
                background: rgba(0, 0, 0, 0.55);
                padding: 4px 8px;
                border-radius: 4px;
                max-width: 220px;
                text-align: right;
                line-height: 1.35;
            }
            #user-subtitle {
                position: fixed;
                bottom: 110px;
                left: 50%;
                transform: translateX(-50%);
                color: #9ad8ff;
                font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
                font-size: 16px;
                line-height: 1.4;
                background: rgba(0, 0, 30, 0.72);
                padding: 6px 18px;
                border-radius: 8px;
                display: none;
                max-width: 80%;
                text-align: center;
                pointer-events: none;
            }
            #credit {
                position: fixed;
                bottom: 10px;
                left: 10px;
                color: #fff;
                font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
                font-size: 12px;
                background: rgba(0, 0, 0, 0.55);
                padding: 4px 10px;
                border-radius: 4px;
                pointer-events: none;
            }
        </style>

        <script type="importmap">
            {
                "imports": {
                    "three": "/libs/three/three.module.js",
                    "three/addons/": "/libs/three/addons/",
                    "@pixiv/three-vrm": "/libs/three-vrm/three-vrm.module.min.js"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
            import { VRMLoaderPlugin, VRMUtils } from "@pixiv/three-vrm";

            const VRM_URL = "http://localhost:8000/vrm/koteko.vrm";
            const WS_URL = `ws://${location.host}/ws`;

            const VOICE_CHAT_URL = "/voice_chat_speak_stream";
            const SPEAKER_ID = 3;

            const statusEl = document.getElementById("status");
            const subtitleEl = document.getElementById("subtitle");
            const userSubtitleEl = document.getElementById("user-subtitle");
            const clickPrompt = document.getElementById("click-prompt");
            const micBtn = document.getElementById("mic-btn");
            const micHint = document.getElementById("mic-hint");

            function setStatus(msg) {
                statusEl.textContent = msg;
            }

            // ARKit viseme → VRM1.0 expression name
            const VISEME_MAP = {
                aa: "aa",
                I: "ih",
                U: "ou",
                E: "ee",
                O: "oh",
                nn: "nn",
                sil: null,
            };

            // Three.js setup
            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.insertBefore(
                renderer.domElement,
                document.getElementById("status"),
            );

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // ---- 背景画像のランダムローテーション (5 分ごと) ----
            const BG_INTERVAL_MS = 5 * 60 * 1000;
            const bgTexLoader = new THREE.TextureLoader();
            let bgList = [];
            let bgIdx = -1;

            function pickNextBgIndex() {
                if (bgList.length <= 1) return 0;
                let n;
                do {
                    n = Math.floor(Math.random() * bgList.length);
                } while (n === bgIdx);
                return n;
            }

            function swapBackground() {
                if (bgList.length === 0) return;
                const n = pickNextBgIndex();
                bgIdx = n;
                bgTexLoader.load(
                    bgList[n],
                    (tex) => {
                        tex.colorSpace = THREE.SRGBColorSpace;
                        scene.background = tex;
                        console.log("bg ->", bgList[n]);
                    },
                    undefined,
                    (err) => console.warn("bg load failed:", bgList[n], err),
                );
            }

            fetch("/images_list")
                .then((r) => r.json())
                .then((d) => {
                    bgList = d.images || [];
                    if (bgList.length > 0) {
                        swapBackground();
                        setInterval(swapBackground, BG_INTERVAL_MS);
                    }
                })
                .catch((e) => console.warn("images_list fetch failed:", e));

            const camera = new THREE.PerspectiveCamera(
                30,
                window.innerWidth / window.innerHeight,
                0.1,
                20,
            );
            camera.position.set(0, 1.35, 1.2);
            camera.lookAt(0, 1.4, 0);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(1, 2, 2);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // AudioContext — requires user gesture
            let audioCtx = null;
            function ensureAudioCtx() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === "suspended") audioCtx.resume();
            }
            document.addEventListener(
                "click",
                () => {
                    ensureAudioCtx();
                    clickPrompt.style.display = "none";
                },
                { once: true },
            );

            // VRM state
            let vrm = null;
            let clock = new THREE.Clock();

            // Active viseme schedule (absolute audioCtx times)
            let visemeSchedule = []; // [{time, name}]
            // Playhead: audioCtx time at which the NEXT queued chunk should start.
            // Set to currentTime at turn_start; advanced by each chunk's duration.
            let playheadTime = 0;
            // Active audio sources scheduled to play (for cancellation on new turn).
            let activeSources = [];
            // Subtitle buffer for the current turn (bot reply accumulation).
            let currentTurnId = null;
            let botReplyBuf = "";
            let subtitleHideTimer = null;

            function stopAllPlayback() {
                for (const s of activeSources) {
                    try {
                        s.stop(0);
                    } catch {}
                    try {
                        s.disconnect();
                    } catch {}
                }
                activeSources = [];
                visemeSchedule = [];
                applyViseme("sil");
                if (audioCtx) playheadTime = audioCtx.currentTime;
            }

            // --- 自然な待機モーション (呼吸 + 体揺れ + 頭の微動) ---
            // 振幅はラジアン。0.02 rad ≒ 1.15°。
            const IDLE = {
                breathHz: 0.25, // 胸の上下動
                swayHz: 0.13, // 体の左右揺れ
                headHz: 0.08, // 頭の緩やかな振り
            };
            function applyIdlePose(t) {
                if (!vrm?.humanoid) return;
                const get = (n) => vrm.humanoid.getNormalizedBoneNode(n);
                const spine = get("spine");
                const chest = get("chest") || get("upperChest");
                const neck = get("neck");
                const head = get("head");

                const breath = Math.sin(t * 2 * Math.PI * IDLE.breathHz);
                const sway = Math.sin(t * 2 * Math.PI * IDLE.swayHz);
                const sway2 = Math.sin(
                    t * 2 * Math.PI * (IDLE.swayHz * 1.3) + 0.7,
                );

                if (spine) {
                    spine.rotation.x = breath * 0.012;
                    spine.rotation.z = sway * 0.02;
                }
                if (chest) {
                    chest.rotation.x = breath * 0.008;
                    chest.rotation.z = sway2 * 0.012;
                }
                if (neck) {
                    neck.rotation.z = sway * 0.01;
                }
                if (head) {
                    head.rotation.x =
                        Math.sin(t * 2 * Math.PI * (IDLE.headHz * 1.3) + 1.3) *
                        0.015;
                    head.rotation.y =
                        Math.sin(t * 2 * Math.PI * IDLE.headHz) * 0.03;
                }
            }

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                const delta = clock.getDelta();

                if (vrm) {
                    applyIdlePose(performance.now() / 1000);
                    if (visemeSchedule.length > 0 && audioCtx) {
                        const now = audioCtx.currentTime;
                        while (
                            visemeSchedule.length > 0 &&
                            visemeSchedule[0].time <= now
                        ) {
                            applyViseme(visemeSchedule.shift().name);
                        }
                    }
                    vrm.update(delta);
                }

                renderer.render(scene, camera);
            }
            animate();

            // T-pose → 自然立ちの腕位置。左右で Z 軸の符号が逆なのは、
            // 肩から見て左右対称に回すため。肘は少し曲げると自然。
            function applyRestPose() {
                if (!vrm?.humanoid) return;
                const get = (n) => vrm.humanoid.getNormalizedBoneNode(n);
                const lUp = get("leftUpperArm");
                const rUp = get("rightUpperArm");
                const lLo = get("leftLowerArm");
                const rLo = get("rightLowerArm");
                if (lUp) lUp.rotation.z = -1.3;
                if (rUp) rUp.rotation.z = 1.3;
                if (lLo) lLo.rotation.y = 0.25;
                if (rLo) rLo.rotation.y = -0.25;
            }

            function applyViseme(arkitName) {
                if (!vrm?.expressionManager) return;
                const mgr = vrm.expressionManager;

                // Reset all mouth expressions
                for (const v of Object.values(VISEME_MAP)) {
                    if (v) mgr.setValue(v, 0);
                }

                const expr = VISEME_MAP[arkitName];
                if (expr) mgr.setValue(expr, 1.0);
            }

            // Load VRM
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            setStatus("Loading VRM...");
            loader.load(
                VRM_URL,
                (gltf) => {
                    vrm = gltf.userData.vrm;
                    VRMUtils.removeUnnecessaryJoints(gltf.scene);
                    scene.add(gltf.scene);

                    // Face camera toward front
                    VRMUtils.rotateVRM0(vrm);

                    // 既定ポーズ: 両手を下ろす (T-pose → 自然立ち)
                    applyRestPose();

                    setStatus("Ready — click to enable audio");
                    console.log("VRM loaded:", vrm);
                    connectWS();
                },
                (progress) => {
                    if (progress.lengthComputable) {
                        setStatus(
                            `Loading ${Math.round((progress.loaded / progress.total) * 100)}%`,
                        );
                    }
                },
                (err) => {
                    setStatus("Load error: " + err.message);
                    console.error(err);
                },
            );

            // WebSocket
            function connectWS() {
                const ws = new WebSocket(WS_URL);
                ws.onopen = () => setStatus("Connected");
                ws.onclose = () => {
                    setStatus("Reconnecting...");
                    setTimeout(connectWS, 2000);
                };
                ws.onerror = () => setStatus("WS error");

                ws.onmessage = async (event) => {
                    let msg;
                    try {
                        msg = JSON.parse(event.data);
                    } catch {
                        return;
                    }

                    if (msg.type === "turn_start") {
                        ensureAudioCtx();
                        currentTurnId = msg.turn_id || null;
                        stopAllPlayback();
                        botReplyBuf = "";
                        subtitleEl.textContent = "";
                        subtitleEl.style.display = "none";
                        if (subtitleHideTimer) {
                            clearTimeout(subtitleHideTimer);
                            subtitleHideTimer = null;
                        }
                        return;
                    }
                    if (msg.type === "turn_end") {
                        // 最後のチャンクが終わったあたりで字幕を消す。
                        if (audioCtx) {
                            const remain =
                                Math.max(
                                    0,
                                    playheadTime - audioCtx.currentTime,
                                ) * 1000;
                            if (subtitleHideTimer)
                                clearTimeout(subtitleHideTimer);
                            subtitleHideTimer = setTimeout(() => {
                                subtitleEl.style.display = "none";
                            }, remain + 800);
                        }
                        return;
                    }
                    if (msg.type === "transcript") {
                        // ユーザー発話は sendToServer 側で user subtitle に出すので here では何もしない。
                        return;
                    }
                    if (msg.type === "error") {
                        console.warn("server error:", msg.error);
                        return;
                    }
                    if (msg.type !== "speak" && msg.type !== undefined) return;

                    ensureAudioCtx();

                    const binary = atob(msg.audio);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++)
                        bytes[i] = binary.charCodeAt(i);

                    let audioBuf;
                    try {
                        audioBuf = await audioCtx.decodeAudioData(
                            bytes.buffer.slice(0),
                        );
                    } catch (e) {
                        console.error("decodeAudioData failed:", e);
                        return;
                    }

                    // キューの末尾 (playheadTime) に連続再生。遅れて到着したら now から。
                    const startAt = Math.max(
                        playheadTime,
                        audioCtx.currentTime + 0.02,
                    );
                    const src = audioCtx.createBufferSource();
                    src.buffer = audioBuf;
                    src.connect(audioCtx.destination);
                    src.start(startAt);
                    activeSources.push(src);
                    src.onended = () => {
                        const i = activeSources.indexOf(src);
                        if (i >= 0) activeSources.splice(i, 1);
                    };

                    // viseme は絶対時刻で積む (複数チャンク分が同時にキューに乗っても干渉しない)
                    const visemes = msg.visemes || [];
                    const vtimes = msg.vtimes || [];
                    const vdurations = msg.vdurations || [];
                    for (let i = 0; i < visemes.length; i++) {
                        const t0 = startAt + (vtimes[i] ?? 0) / 1000;
                        const dur = (vdurations[i] ?? 100) / 1000;
                        visemeSchedule.push({ time: t0, name: visemes[i] });
                        visemeSchedule.push({ time: t0 + dur, name: "sil" });
                    }
                    visemeSchedule.sort((a, b) => a.time - b.time);

                    playheadTime = startAt + audioBuf.duration;

                    if (msg.text) {
                        botReplyBuf += msg.text;
                        subtitleEl.textContent = botReplyBuf;
                        subtitleEl.style.display = "block";
                    }

                    console.log(
                        "speak chunk:",
                        msg.seq ?? "-",
                        visemes.length,
                        "visemes,",
                        audioBuf.duration.toFixed(2),
                        "s, startAt",
                        startAt.toFixed(2),
                    );
                };
            }

            // ---- Mic recording (MediaRecorder → /voice_chat_speak) ----
            let mediaRecorder = null;
            let mediaStream = null;
            let recordedChunks = [];
            let recState = "idle"; // idle | recording | busy
            let pressTimer = null;
            let pressedLong = false;

            function setMicState(next, hint) {
                recState = next;
                micBtn.classList.toggle("recording", next === "recording");
                micBtn.classList.toggle("busy", next === "busy");
                micBtn.disabled = next === "busy";
                if (hint) micHint.textContent = hint;
            }

            function showUserSubtitle(text) {
                if (!text) {
                    userSubtitleEl.style.display = "none";
                    return;
                }
                userSubtitleEl.textContent = "🗣 " + text;
                userSubtitleEl.style.display = "block";
            }

            function pickMimeType() {
                const candidates = [
                    "audio/webm;codecs=opus",
                    "audio/webm",
                    "audio/ogg;codecs=opus",
                    "audio/mp4",
                ];
                for (const m of candidates) {
                    if (
                        window.MediaRecorder &&
                        MediaRecorder.isTypeSupported(m)
                    )
                        return m;
                }
                return "";
            }

            async function startRecording() {
                if (recState !== "idle") return;
                ensureAudioCtx();
                try {
                    if (!mediaStream) {
                        mediaStream = await navigator.mediaDevices.getUserMedia(
                            {
                                audio: {
                                    channelCount: 1,
                                    echoCancellation: true,
                                    noiseSuppression: true,
                                    autoGainControl: true,
                                },
                            },
                        );
                    }
                } catch (e) {
                    setMicState("idle", "マイク拒否: " + e.message);
                    return;
                }

                const mime = pickMimeType();
                try {
                    mediaRecorder = mime
                        ? new MediaRecorder(mediaStream, { mimeType: mime })
                        : new MediaRecorder(mediaStream);
                } catch (e) {
                    setMicState("idle", "録音失敗: " + e.message);
                    return;
                }

                recordedChunks = [];
                mediaRecorder.ondataavailable = (ev) => {
                    if (ev.data && ev.data.size > 0)
                        recordedChunks.push(ev.data);
                };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, {
                        type: mediaRecorder.mimeType || "audio/webm",
                    });
                    sendToServer(blob);
                };
                mediaRecorder.start();
                setMicState("recording", "録音中… 離す/クリックで送信");
            }

            function stopRecording() {
                if (recState !== "recording" || !mediaRecorder) return;
                try {
                    mediaRecorder.stop();
                } catch {}
                setMicState("busy", "送信中…");
            }

            async function sendToServer(blob) {
                if (blob.size < 1000) {
                    setMicState("idle", "音声が短すぎます");
                    return;
                }
                // 先の返答が残っていれば即止める (server の turn_start を待たない)。
                stopAllPlayback();
                const ext = blob.type.includes("ogg")
                    ? "ogg"
                    : blob.type.includes("mp4")
                      ? "mp4"
                      : "webm";
                const fd = new FormData();
                fd.append("audio", blob, `utterance.${ext}`);
                fd.append("speaker_id", String(SPEAKER_ID));

                try {
                    const res = await fetch(VOICE_CHAT_URL, {
                        method: "POST",
                        body: fd,
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        setMicState(
                            "idle",
                            "エラー: " + (data.error || res.status),
                        );
                        return;
                    }
                    const transcript = (data.transcript || "").trim();
                    const reply = (data.reply || "").trim();
                    showUserSubtitle(transcript);
                    if (!reply) {
                        setMicState(
                            "idle",
                            transcript ? "応答なし" : "聞き取れず",
                        );
                    } else {
                        setMicState("idle", `OK (${data.chunks || 0} chunks)`);
                    }
                } catch (e) {
                    setMicState("idle", "通信失敗: " + e.message);
                }
            }

            function toggleRecording() {
                if (recState === "idle") startRecording();
                else if (recState === "recording") stopRecording();
            }

            // Push-to-talk: hold >= 250ms to use press/release; shorter = click-to-toggle.
            micBtn.addEventListener("pointerdown", (e) => {
                if (recState !== "idle") return;
                e.preventDefault();
                pressedLong = false;
                pressTimer = setTimeout(() => {
                    pressedLong = true;
                    startRecording();
                }, 250);
            });
            const cancelPress = (e) => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                if (pressedLong) {
                    // release = stop
                    if (recState === "recording") stopRecording();
                    pressedLong = false;
                } else if (e && e.type === "pointerup" && e.button === 0) {
                    // short click → toggle
                    toggleRecording();
                }
            };
            micBtn.addEventListener("pointerup", cancelPress);
            micBtn.addEventListener("pointerleave", () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
            });
            micBtn.addEventListener("pointercancel", () => {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }
                if (recState === "recording") stopRecording();
            });

            // Enable mic only after mediaDevices is available and audio unlocked
            if (!navigator.mediaDevices?.getUserMedia) {
                micHint.textContent = "このブラウザはマイク録音に非対応";
            } else {
                const unlock = () => {
                    micBtn.disabled = false;
                    micHint.textContent = "長押しで録音 / クリックで開始・停止";
                };
                document.addEventListener("click", unlock, { once: true });
            }
        </script>
    </head>
    <body>
        <div id="status">Initializing...</div>
        <div id="user-subtitle"></div>
        <div id="subtitle"></div>
        <div id="click-prompt">クリックして音声を有効化</div>
        <div id="mic-controls">
            <div id="mic-hint">長押しで録音 / クリックで開始・停止</div>
            <button id="mic-btn" type="button" disabled title="マイク">
                🎤
            </button>
        </div>
        <div id="credit">VOICEVOX:ずんだもん</div>
    </body>
</html>
